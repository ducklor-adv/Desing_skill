<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Design Board — กระดานออกแบบ Element</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1f2430; --line:#2a3040;
    --txt:#e6e9ef; --muted:#8b93a7; --accent:#4f8cff; --accent2:#22c55e;
    --danger:#ef4444;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--txt)}
  #app{display:grid;grid-template-columns:200px 1fr 280px;grid-template-rows:48px 1fr;height:100vh}

  /* Topbar */
  #topbar{grid-column:1/4;display:flex;align-items:center;gap:8px;padding:0 12px;background:var(--panel);border-bottom:1px solid var(--line)}
  #topbar h1{font-size:14px;margin:0;font-weight:600;letter-spacing:.3px}
  #topbar .spacer{flex:1}
  .btn{background:var(--panel2);color:var(--txt);border:1px solid var(--line);padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent)}
  .btn.danger:hover{border-color:var(--danger);color:var(--danger)}

  /* Palette */
  #palette{background:var(--panel);border-right:1px solid var(--line);padding:10px;overflow:auto}
  #palette .group{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:6px 2px}
  .pal-btn{display:flex;align-items:center;gap:8px;width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:8px 10px;border-radius:6px;margin-bottom:6px;cursor:pointer;font-size:13px;text-align:left}
  .pal-btn:hover{border-color:var(--accent);transform:translateX(2px)}
  .pal-btn .ic{width:16px;text-align:center;opacity:.8}

  /* Canvas */
  #stage{position:relative;overflow:auto;background:
    linear-gradient(90deg,#171a2133 1px,transparent 1px) 0 0/20px 20px,
    linear-gradient(#171a2133 1px,transparent 1px) 0 0/20px 20px,
    var(--bg)}
  #canvas{position:relative;width:1280px;height:1600px;margin:24px;background:#fff;border-radius:8px;box-shadow:0 0 0 1px var(--line);color:#111}
  .el{position:absolute;cursor:move;user-select:none;min-width:24px;min-height:20px}
  .el.selected{outline:2px solid var(--accent);outline-offset:1px}
  .el .resize{position:absolute;right:-5px;bottom:-5px;width:12px;height:12px;background:var(--accent);border:2px solid #fff;border-radius:3px;cursor:nwse-resize;display:none}
  .el.selected .resize{display:block}
  .el .tag{position:absolute;top:-18px;left:0;font-size:10px;color:var(--accent);background:#0f1115cc;padding:1px 5px;border-radius:3px;display:none;white-space:nowrap}
  .el.selected .tag{display:block}

  /* Inspector */
  #inspector{background:var(--panel);border-left:1px solid var(--line);padding:12px;overflow:auto}
  #inspector h2{font-size:12px;color:var(--muted);text-transform:uppercase;margin:0 0 10px}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
  .field input,.field select,.field textarea{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:6px 8px;border-radius:5px;font-size:12px}
  .row{display:flex;gap:8px}
  .row .field{flex:1}
  .empty{color:var(--muted);font-size:12px;text-align:center;margin-top:40px}
  .hint{font-size:11px;color:var(--muted);margin-top:14px;line-height:1.6}
  #count{font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <h1>🎨 Design Board</h1>
    <span id="count">0 elements</span>
    <select id="presetSel" class="btn" title="เลือกต้นแบบ UI"></select>
    <button class="btn" id="btnLoadPreset">📋 โหลด</button>
    <button class="btn" id="btnSavePreset">💾 บันทึกเป็นต้นแบบ</button>
    <button class="btn danger" id="btnDelPreset" title="ลบต้นแบบของฉันที่เลือก">🗑</button>
    <span class="spacer"></span>
    <button class="btn" id="btnExport">⬇ Export JSON</button>
    <button class="btn" id="btnImport">⬆ Import JSON</button>
    <button class="btn danger" id="btnClear">🗑 Clear</button>
    <input type="file" id="fileInput" accept="application/json" hidden />
  </div>

  <div id="palette">
    <div class="group">เพิ่ม Element</div>
    <!-- buttons injected by JS -->
  </div>

  <div id="stage">
    <div id="canvas"></div>
  </div>

  <div id="inspector">
    <h2>Properties</h2>
    <div id="inspectorBody"><div class="empty">เลือก element เพื่อแก้ไข<br/>หรือคลิกปุ่มซ้ายเพื่อสร้าง</div></div>
  </div>
</div>

<script>
/* ============================================================
   Design Board — core data model
   element schema (สิ่งที่ระบบ "จดจำ"):
   { id, type, name, x, y, w, h, style:{...}, text, mapsTo }
   ============================================================ */

// ---- Element type catalog (ต้นแบบของแต่ละชนิด) ----
const CATALOG = {
  heading:   {icon:"H", label:"Heading", w:240, h:40,  text:"หัวข้อ",      style:{fontSize:24,fontWeight:700,color:"#111111",bg:"transparent",radius:0,padding:4,border:"none",align:"left"}},
  text:      {icon:"T", label:"Text",    w:200, h:24,  text:"ข้อความ",     style:{fontSize:14,fontWeight:400,color:"#333333",bg:"transparent",radius:0,padding:2,border:"none",align:"left"}},
  button:    {icon:"▭", label:"Button",  w:120, h:40,  text:"ปุ่ม",        style:{fontSize:14,fontWeight:600,color:"#ffffff",bg:"#4f8cff",radius:8,padding:8,border:"none",align:"center"}},
  input:     {icon:"▢", label:"Input",   w:220, h:40,  text:"",           style:{fontSize:14,fontWeight:400,color:"#111111",bg:"#ffffff",radius:6,padding:8,border:"1px solid #cccccc",align:"left",placeholder:"กรอกข้อมูล..."}},
  image:     {icon:"🖼", label:"Image",   w:160, h:120, text:"IMG",        style:{fontSize:12,fontWeight:400,color:"#888888",bg:"#eeeeee",radius:6,padding:0,border:"1px dashed #cccccc",align:"center"}},
  card:      {icon:"▦", label:"Card",    w:240, h:160, text:"",           style:{fontSize:14,fontWeight:400,color:"#111111",bg:"#ffffff",radius:12,padding:12,border:"1px solid #e5e7eb",align:"left"}},
  box:       {icon:"☐", label:"Box",     w:200, h:120, text:"",           style:{fontSize:14,fontWeight:400,color:"#111111",bg:"#f3f4f6",radius:8,padding:8,border:"1px dashed #cbd5e1",align:"left"}},
};

/* ============================================================
   PRESETS — ต้นแบบ UI ตัวอย่าง (โหลดมาวางให้ แล้วลากวาง/รีดีไซน์ต่อ)
   ใช้ element schema เดิม 100% (ไม่แตะ schema/CATALOG)
   ============================================================ */
const PRESETS = {
  login: { label:'🔐 Login Card', build:()=>[
    mk('card',   {name:'Card',     x:40,  y:40,  w:360, h:360, style:{bg:'#ffffff',radius:16,border:'1px solid #e5e7eb'}}),
    mk('heading',{name:'Title',    x:72,  y:72,  w:300, h:36,  text:'เข้าสู่ระบบ', style:{fontSize:24,align:'center'}}),
    mk('text',   {name:'lblEmail', x:72,  y:128, w:300, h:20,  text:'อีเมล', style:{fontSize:13,color:'#6b7280'}}),
    mk('input',  {name:'email',    x:72,  y:150, w:300, h:40,  style:{placeholder:'you@email.com'}}),
    mk('text',   {name:'lblPass',  x:72,  y:205, w:300, h:20,  text:'รหัสผ่าน', style:{fontSize:13,color:'#6b7280'}}),
    mk('input',  {name:'password', x:72,  y:227, w:300, h:40,  style:{placeholder:'••••••••'}}),
    mk('button', {name:'submit',   x:72,  y:290, w:300, h:44,  text:'เข้าสู่ระบบ'}),
    mk('text',   {name:'forgot',   x:72,  y:345, w:300, h:20,  text:'ลืมรหัสผ่าน?', style:{fontSize:12,color:'#4f8cff',align:'center'}}),
  ]},
  profile: { label:'👤 Profile Card', build:()=>[
    mk('card',   {name:'Card',     x:40,  y:40,  w:280, h:300, style:{bg:'#ffffff',radius:16,border:'1px solid #e5e7eb'}}),
    mk('image',  {name:'avatar',   x:140, y:64,  w:80,  h:80,  text:'IMG', style:{radius:40}}),
    mk('heading',{name:'name',     x:60,  y:158, w:240, h:30,  text:'สมชาย ใจดี', style:{fontSize:20,align:'center'}}),
    mk('text',   {name:'role',     x:60,  y:190, w:240, h:20,  text:'Frontend Developer', style:{fontSize:13,color:'#6b7280',align:'center'}}),
    mk('button', {name:'follow',   x:80,  y:244, w:200, h:42,  text:'ติดตาม'}),
  ]},
  header: { label:'🧭 Dashboard Header', build:()=>[
    mk('box',    {name:'bar',      x:40,  y:40,  w:760, h:64,  style:{bg:'#0f172a',radius:12,border:'none'}}),
    mk('heading',{name:'logo',     x:64,  y:56,  w:200, h:32,  text:'FastCourt', style:{fontSize:22,color:'#ffffff'}}),
    mk('text',   {name:'navHome',  x:380, y:62,  w:80,  h:20,  text:'หน้าแรก', style:{color:'#cbd5e1',align:'center'}}),
    mk('text',   {name:'navBook',  x:470, y:62,  w:80,  h:20,  text:'จองคอร์ท', style:{color:'#cbd5e1',align:'center'}}),
    mk('button', {name:'cta',      x:660, y:54,  w:120, h:36,  text:'+ จองเลย'}),
  ]},
};

// สร้าง element จาก preset โดยใช้ default ของ CATALOG เป็นฐาน แล้ว override
function mk(type, o){
  const def=CATALOG[type];
  return {
    id:'el_'+(++state.seq), type,
    name:o.name||def.label+' '+state.seq,
    x:o.x, y:o.y, w:o.w??def.w, h:o.h??def.h,
    text:o.text??def.text,
    style:Object.assign(JSON.parse(JSON.stringify(def.style)), o.style||{}),
    mapsTo:null
  };
}

const state = { els:[], selected:null, seq:0 };
const canvas = document.getElementById('canvas');
const inspectorBody = document.getElementById('inspectorBody');
const countEl = document.getElementById('count');

// ---- Build palette ----
const palette = document.getElementById('palette');
Object.entries(CATALOG).forEach(([type,def])=>{
  const b=document.createElement('button');
  b.className='pal-btn';
  b.innerHTML=`<span class="ic">${def.icon}</span> ${def.label}`;
  b.onclick=()=>addElement(type);
  palette.appendChild(b);
});

// ---- Create element ----
function addElement(type, opts={}){
  const def=CATALOG[type];
  const el={
    id:'el_'+(++state.seq),
    type,
    name:def.label+' '+state.seq,
    x:opts.x ?? 40, y:opts.y ?? 40,
    w:def.w, h:def.h,
    text:def.text,
    style:JSON.parse(JSON.stringify(def.style)),
    mapsTo:null   // เผื่อ map UI เก่า -> ใหม่ ภายหลัง
  };
  state.els.push(el);
  renderEl(el);
  select(el.id);
  save();
}

// ---- Render one element ----
function renderEl(el){
  let node=document.getElementById(el.id);
  if(!node){
    node=document.createElement('div');
    node.id=el.id; node.className='el';
    node.innerHTML=`<span class="tag"></span><span class="content"></span><span class="resize"></span>`;
    canvas.appendChild(node);
    attachDrag(node,el);
  }
  const s=el.style;
  Object.assign(node.style,{
    left:el.x+'px', top:el.y+'px', width:el.w+'px', height:el.h+'px',
    fontSize:s.fontSize+'px', fontWeight:s.fontWeight, color:s.color,
    background:s.bg, borderRadius:s.radius+'px', padding:s.padding+'px',
    border:s.border==='none'?'none':s.border, textAlign:s.align,
    display:'flex', alignItems:'center',
    justifyContent: s.align==='center'?'center':(s.align==='right'?'flex-end':'flex-start'),
    overflow:'hidden'
  });
  node.querySelector('.tag').textContent=`${el.type} · ${el.w}×${el.h}`;
  const content=node.querySelector('.content');
  if(el.type==='input'){ content.textContent=s.placeholder||''; content.style.opacity=.6; }
  else { content.textContent=el.text; content.style.opacity=1; }
}

// ---- Drag + resize ----
function attachDrag(node,el){
  let mode=null,sx,sy,ox,oy,ow,oh;
  node.addEventListener('mousedown',e=>{
    select(el.id);
    mode = e.target.classList.contains('resize') ? 'resize':'move';
    sx=e.clientX; sy=e.clientY; ox=el.x; oy=el.y; ow=el.w; oh=el.h;
    e.preventDefault();
    const mv=ev=>{
      const dx=ev.clientX-sx, dy=ev.clientY-sy;
      if(mode==='move'){ el.x=Math.max(0,Math.round((ox+dx)/5)*5); el.y=Math.max(0,Math.round((oy+dy)/5)*5); }
      else { el.w=Math.max(24,Math.round((ow+dx)/5)*5); el.h=Math.max(20,Math.round((oh+dy)/5)*5); }
      renderEl(el); if(state.selected===el.id) renderInspector(el);
    };
    const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);save();};
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
}

// ---- Selection ----
function select(id){
  state.selected=id;
  document.querySelectorAll('.el').forEach(n=>n.classList.toggle('selected',n.id===id));
  const el=state.els.find(e=>e.id===id);
  if(el) renderInspector(el);
}
canvas.addEventListener('mousedown',e=>{ if(e.target===canvas){state.selected=null;document.querySelectorAll('.el').forEach(n=>n.classList.remove('selected'));inspectorBody.innerHTML='<div class="empty">เลือก element เพื่อแก้ไข</div>';}});

// ---- Inspector (แก้ไขรายละเอียด design) ----
function renderInspector(el){
  const s=el.style;
  const f=(label,key,type='text',val,opts)=>{
    if(type==='select'){
      return `<div class="field"><label>${label}</label><select data-k="${key}">${opts.map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
    }
    return `<div class="field"><label>${label}</label><input data-k="${key}" type="${type}" value="${val??''}"/></div>`;
  };
  inspectorBody.innerHTML=`
    ${f('Name','name','text',el.name)}
    <div class="field"><label>Type</label><input value="${el.type}" disabled style="opacity:.6"/></div>
    <div class="row">${f('X','x','number',el.x)}${f('Y','y','number',el.y)}</div>
    <div class="row">${f('W','w','number',el.w)}${f('H','h','number',el.h)}</div>
    ${el.type==='input'? f('Placeholder','s.placeholder','text',s.placeholder) : f('Text','text','text',el.text)}
    <div class="row">${f('Font size','s.fontSize','number',s.fontSize)}${f('Weight','s.fontWeight','number',s.fontWeight)}</div>
    ${f('Align','s.align','select',s.align,['left','center','right'])}
    <div class="row">
      <div class="field"><label>Color</label><input data-k="s.color" type="color" value="${s.color}"/></div>
      <div class="field"><label>BG</label><input data-k="s.bg" type="color" value="${s.bg==='transparent'?'#ffffff':s.bg}"/></div>
    </div>
    <div class="row">${f('Radius','s.radius','number',s.radius)}${f('Padding','s.padding','number',s.padding)}</div>
    ${f('Border (css)','s.border','text',s.border)}
    ${f('Maps to (UI เก่า)','mapsTo','text',el.mapsTo||'')}
    <div class="row" style="margin-top:8px">
      <button class="btn" id="dupBtn" style="flex:1">⧉ Duplicate</button>
      <button class="btn danger" id="delBtn" style="flex:1">🗑 Delete</button>
    </div>
    <div class="hint">ค่าทุกช่องคือ "รายละเอียด design" ที่ระบบจดจำลง schema JSON</div>
  `;
  inspectorBody.querySelectorAll('[data-k]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      let v=inp.value; if(inp.type==='number') v=Number(v);
      const k=inp.dataset.k;
      if(k.startsWith('s.')) el.style[k.slice(2)]=v;
      else el[k]=v;
      renderEl(el); save();
    });
  });
  inspectorBody.querySelector('#delBtn').onclick=()=>delElement(el.id);
  inspectorBody.querySelector('#dupBtn').onclick=()=>{ const c=JSON.parse(JSON.stringify(el)); c.id='el_'+(++state.seq); c.x+=20;c.y+=20;c.name=el.name+' copy'; c.mapsTo=null; state.els.push(c); renderEl(c); select(c.id); save(); };
}

function delElement(id){
  state.els=state.els.filter(e=>e.id!==id);
  document.getElementById(id)?.remove();
  state.selected=null;
  inspectorBody.innerHTML='<div class="empty">เลือก element เพื่อแก้ไข</div>';
  save();
}

// ---- Persistence ----
function save(){
  countEl.textContent=state.els.length+' elements';
  localStorage.setItem('designBoard', JSON.stringify({els:state.els,seq:state.seq}));
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('designBoard'));
    if(d&&d.els){ state.els=d.els; state.seq=d.seq||0; state.els.forEach(renderEl); save(); }
  }catch(e){}
}

// ---- Toolbar ----
document.getElementById('btnExport').onclick=()=>{
  const blob=new Blob([JSON.stringify({version:1,els:state.els},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='design.json'; a.click();
};
document.getElementById('btnImport').onclick=()=>document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange=e=>{
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); canvas.innerHTML=''; state.els=d.els||[]; state.seq=Math.max(0,...state.els.map(x=>+x.id.split('_')[1]||0)); state.els.forEach(renderEl); save(); }catch(err){alert('ไฟล์ไม่ถูกต้อง');} };
  r.readAsText(file);
};
document.getElementById('btnClear').onclick=()=>{ if(confirm('ลบทั้งหมด?')){ state.els=[];state.seq=0;canvas.innerHTML='';state.selected=null;inspectorBody.innerHTML='<div class="empty">เลือก element เพื่อแก้ไข</div>';save(); } };

// keyboard delete
document.addEventListener('keydown',e=>{ if((e.key==='Delete'||e.key==='Backspace')&&state.selected&&document.activeElement.tagName!=='INPUT'){ delElement(state.selected);} });

// ---- Preset loader (ต้นแบบ) ----
function loadPreset(key,{confirmReplace=true}={}){
  const p=PRESETS[key]; if(!p)return;
  if(confirmReplace && state.els.length && !confirm('โหลดต้นแบบจะแทนที่งานปัจจุบันทั้งหมด ดำเนินการต่อ?')) return;
  canvas.innerHTML=''; state.els=[]; state.selected=null; state.seq=0;
  inspectorBody.innerHTML='<div class="empty">เลือก element เพื่อแก้ไข</div>';
  p.build().forEach(el=>{ state.els.push(el); renderEl(el); });
  save();
}
// โหลดต้นแบบ "ของฉัน" (เก็บเป็น array ของ element ที่ผู้ใช้ออกแบบเอง)
function loadTemplate(els,{confirmReplace=true}={}){
  if(confirmReplace && state.els.length && !confirm('โหลดต้นแบบจะแทนที่งานปัจจุบันทั้งหมด ดำเนินการต่อ?')) return;
  canvas.innerHTML=''; state.els=JSON.parse(JSON.stringify(els)); state.selected=null;
  state.seq=Math.max(0,...state.els.map(x=>+(String(x.id).split('_')[1])||0));
  inspectorBody.innerHTML='<div class="empty">เลือก element เพื่อแก้ไข</div>';
  state.els.forEach(renderEl); save();
}

// ---- User templates (ผู้ใช้เขียนต้นแบบเอง → เก็บลง localStorage) ----
function getUserTemplates(){ try{return JSON.parse(localStorage.getItem('designTemplates'))||{}}catch(e){return{}} }
function setUserTemplates(t){ localStorage.setItem('designTemplates', JSON.stringify(t)); }

const presetSel=document.getElementById('presetSel');
function refreshPresetDropdown(){
  presetSel.innerHTML='';
  const g1=document.createElement('optgroup'); g1.label='ต้นแบบในระบบ';
  Object.entries(PRESETS).forEach(([k,p])=>{ g1.appendChild(new Option(p.label,'builtin:'+k)); });
  presetSel.appendChild(g1);
  const ut=getUserTemplates(); const keys=Object.keys(ut);
  if(keys.length){
    const g2=document.createElement('optgroup'); g2.label='ต้นแบบของฉัน';
    keys.forEach(k=>g2.appendChild(new Option('★ '+ut[k].label,'user:'+k)));
    presetSel.appendChild(g2);
  }
}
refreshPresetDropdown();

document.getElementById('btnLoadPreset').onclick=()=>{
  const [kind,key]=presetSel.value.split(':');
  if(kind==='builtin') loadPreset(key);
  else { const ut=getUserTemplates(); if(ut[key]) loadTemplate(ut[key].els); }
};
document.getElementById('btnSavePreset').onclick=()=>{
  if(!state.els.length){ alert('ยังไม่มี element บนกระดาน'); return; }
  const label=prompt('ตั้งชื่อต้นแบบของคุณ:'); if(!label) return;
  const ut=getUserTemplates(); const key='t_'+Date.now();
  ut[key]={label, els:JSON.parse(JSON.stringify(state.els))};
  setUserTemplates(ut); refreshPresetDropdown(); presetSel.value='user:'+key;
  alert('บันทึกต้นแบบ "'+label+'" แล้ว — เรียกกลับมาใช้ได้จาก dropdown');
};
document.getElementById('btnDelPreset').onclick=()=>{
  const [kind,key]=presetSel.value.split(':');
  if(kind!=='user'){ alert('ลบได้เฉพาะ "ต้นแบบของฉัน"'); return; }
  const ut=getUserTemplates(); if(!ut[key])return;
  if(!confirm('ลบต้นแบบ "'+ut[key].label+'"?'))return;
  delete ut[key]; setUserTemplates(ut); refreshPresetDropdown();
};

load();
// เปิดครั้งแรก (ยังไม่มีงาน) ให้โหลดต้นแบบตัวอย่างทันที จะได้ไม่เริ่มจากกระดานเปล่า
if(state.els.length===0) loadPreset('login',{confirmReplace:false});
</script>
</body>
